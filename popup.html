<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <div class="mark" id="mark">
      <svg viewBox="0 0 40 40" class="mark-svg">
        <circle class="sweep-ring" cx="20" cy="20" r="17"></circle>
        <path class="shield" d="M20 6 L32 10.5 V19 C32 27 26.5 32.5 20 35 C13.5 32.5 8 27 8 19 V10.5 Z"></path>
        <path class="check" d="M14.5 20 L18.5 24 L26 15.5"></path>
      </svg>
    </div>
    <div class="title-block">
      <h1>AniBlocker</h1>
      <span class="tagline" id="tagline">scanning this page</span>
    </div>
  </div>

  <div class="status-card">
    <div class="stat">
      <div class="stat-number" id="pageCount">0</div>
      <div class="stat-label">this page</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-number" id="totalCount">0</div>
      <div class="stat-label">all time</div>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Protection</span>
    <label class="switch">
      <input type="checkbox" id="enabledToggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <button id="reloadBtn" class="reload-btn">Reload page</button>

  <p class="footnote">Blocks ad &amp; tracker requests network-wide, then sweeps the page for anything left behind.</p>
</body>
<script src="popup.js"></script>
</html>
